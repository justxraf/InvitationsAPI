name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref to save runner minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # Style + static analysis + public-API compatibility. Fast, fails early.
  lint:
    name: Lint & API check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - uses: gradle/actions/setup-gradle@v4
      - name: ktlint + detekt + binary-compatibility
        run: ./gradlew --no-daemon ktlintCheck detekt apiCheck

  # Build, run the full test suite (incl. property/concurrency/stress/perf lanes), enforce coverage.
  test:
    name: Build & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - uses: gradle/actions/setup-gradle@v4
      - name: Build, test & verify coverage
        run: ./gradlew --no-daemon build jacocoTestCoverageVerification
      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: build/reports/tests/test
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: build/reports/jacoco/test

  # API docs must generate cleanly, and a publish dry-run must resolve before a real release.
  docs-and-publish-dry-run:
    name: Docs & publish dry-run
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - uses: gradle/actions/setup-gradle@v4
      - name: Generate Dokka API docs
        run: ./gradlew --no-daemon dokkaHtml
      - name: Upload API docs
        uses: actions/upload-artifact@v4
        with:
          name: api-docs
          path: build/dokka/html
      # Publishing isn't configured yet (see ROADMAP §10). Until `maven-publish` lands, the dry-run is
      # `assemble` to a local staging dir; swap to `publishToMavenLocal` once publishing is wired.
      - name: Publish dry-run (assemble artifacts)
        run: ./gradlew --no-daemon assemble
